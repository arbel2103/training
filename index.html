<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/training/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="manifest" href="/training/manifest.webmanifest" />
    <meta name="theme-color" content="#b5654a" />
    <link rel="apple-touch-icon" href="/training/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="fitness" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Frank+Ruhl+Libre:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <title>fitness</title>
    <script>
      // apply theme before first paint (saved choice, else system preference)
      try {
        var t = localStorage.getItem('fitness-theme')
        if (!t && matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark'
        if (t === 'dark') document.documentElement.dataset.theme = 'dark'
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
